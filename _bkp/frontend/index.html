<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microblog • Compartilhe ideias</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="card login-card" id="login-area">
            <div class="logo">
                <span class="logo-icon">📝</span>
                <span class="logo-text">microblog</span>
            </div>
            <h2>Bem-vindo de volta</h2>
            <p class="subtitle">Entre com suas credenciais</p>
            <input type="text" id="username" placeholder="Usuário" autocomplete="off">
            <input type="password" id="password" placeholder="Senha">
            <button onclick="login()" class="btn-primary">Entrar</button>
            <p id="login-error" class="error-message"></p>
        </div>

        <div id="app-area" style="display:none;">
            <div class="top-bar">
                <div class="logo small">
                    <span class="logo-icon">📝</span>
                    <span class="logo-text">microblog</span>
                </div>
                <div class="user-menu">
                    <span class="user-name" id="current-user"></span>
                    <button onclick="logout()" class="btn-outline">Sair</button>
                </div>
            </div>

            <div class="card new-post-card">
                <textarea id="post-content" rows="3" placeholder="No que você está pensando?"></textarea>
                <div class="post-actions-bar">
                    <button onclick="createPost()" class="btn-primary">Publicar</button>
                </div>
            </div>

            <h3 class="feed-title">📰 Feed de ideias</h3>
            <div id="posts-list" class="posts-feed"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
